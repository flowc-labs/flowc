---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: apis.flowc.io
spec:
  group: flowc.io
  names:
    kind: API
    listKind: APIList
    plural: apis
    singular: api
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.context
      name: Context
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: API is the Schema for the apis API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of API
            properties:
              apiType:
                description: |-
                  apiType is the specification type: rest, grpc, graphql, websocket, sse.
                  Auto-detected from specContent if empty.
                enum:
                - rest
                - grpc
                - graphql
                - websocket
                - sse
                - ""
                type: string
              context:
                description: context is the base path where this API is exposed (e.g.,
                  "/petstore").
                type: string
              description:
                description: description is a human-readable description.
                type: string
              displayName:
                description: displayName is a human-friendly display name.
                type: string
              policyChain:
                description: policyChain is an ordered list of policy instances.
                items:
                  description: PolicyInstance represents an attached policy with its
                    configuration.
                  properties:
                    config:
                      description: config holds type-specific policy configuration.
                      x-kubernetes-preserve-unknown-fields: true
                    enabled:
                      default: true
                      description: enabled indicates whether this policy instance
                        is active.
                      type: boolean
                    id:
                      description: id is a unique identifier for this policy instance.
                      type: string
                    inheritanceMode:
                      description: 'inheritanceMode controls policy merging across
                        levels: inherit, override, disable, add.'
                      enum:
                      - inherit
                      - override
                      - disable
                      - add
                      type: string
                    order:
                      description: order determines execution order within a stage
                        (lower runs first).
                      type: integer
                    policyType:
                      description: policyType identifies the type of policy (e.g.,
                        "rate-limit", "cors", "jwt-auth").
                      type: string
                  required:
                  - id
                  - policyType
                  type: object
                type: array
              routing:
                description: routing defines route matching behavior.
                properties:
                  caseSensitive:
                    description: caseSensitive enables case-sensitive path matching.
                    type: boolean
                  loadBalancing:
                    description: loadBalancing is the load balancing algorithm.
                    enum:
                    - round-robin
                    - least-request
                    - random
                    - consistent-hash
                    - locality-aware
                    type: string
                  matchType:
                    default: prefix
                    description: 'matchType is the route matching strategy: prefix,
                      exact, regex, header-versioned.'
                    enum:
                    - prefix
                    - exact
                    - regex
                    - header-versioned
                    type: string
                type: object
              specContent:
                description: specContent holds the full API specification as a string
                  (OpenAPI YAML, proto, etc.).
                type: string
              upstream:
                description: upstream defines the backend service.
                properties:
                  host:
                    description: host is the hostname or IP of the upstream service.
                    type: string
                  port:
                    description: port is the port of the upstream service.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                  scheme:
                    default: http
                    description: scheme is the protocol scheme (http or https).
                    type: string
                  timeout:
                    default: 30s
                    description: timeout is the request timeout (e.g., "30s", "5m").
                    type: string
                required:
                - host
                - port
                type: object
              version:
                description: version is the semver version of this API.
                type: string
            required:
            - context
            - upstream
            - version
            type: object
          status:
            description: status defines the observed state of API
            properties:
              conditions:
                description: conditions represent the current state of the API.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              parsedInfo:
                description: parsedInfo contains metadata extracted from the parsed
                  specification.
                properties:
                  paths:
                    description: paths lists the API paths/endpoints.
                    items:
                      type: string
                    type: array
                  servers:
                    description: servers lists the server URLs from the spec.
                    items:
                      type: string
                    type: array
                  title:
                    description: title is the API title from the spec.
                    type: string
                  version:
                    description: version is the API version from the spec.
                    type: string
                type: object
              phase:
                description: phase is the current lifecycle phase.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
